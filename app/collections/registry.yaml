# Collection registry — curated catalog of RODA Cloud-Optimized-GeoTIFF aerial
# imagery collections.
#
# This is the LOOKUP TABLE (design layer 0). Each entry pairs:
#   - extent : coarse spatial + temporal coverage, for the map "what's here" lookup
#   - source : the CollectionDescriptor, for ingest (Stage 1)
# See COLLECTIONS.md > "The collection registry & the map lookup".
#
# It compiles two ways:
#   - collections.geojson  -> shipped to the viewer; intersect vs viewport on moveend
#   - CollectionDescriptor -> the ingest pipeline
#
# Adding a collection = adding one entry here. Never edit pipeline code for a new
# collection. Scope rule: COG only. Datasets with no COG representation are not
# listed; mixed-format datasets list only their COG product (e.g. NJ `cog/`).
#
# REGION SCOPE (DECISION 2026-06): single region — us-west-2 ONLY for now.
#   Region as a user/config choice is a deliberate LATER feature, not built now.
#   us-west-2 is anchored by NAIP (primary collection); all active collections
#   are in it, so the active set has zero cross-region exposure.
#   See COLLECTIONS.md > "Region & latency (decision)".
#
#   `active: true`  = in scope now (bucket in us-west-2).
#   `active: false` = parked: layout may be pinned, but the bucket is NOT in
#                     us-west-2. Do NOT ingest until region becomes a choice; then
#                     flip `active` AND run a source-region chipper (only derived
#                     chips/rows cross regions, never raw COG range reads).
#
# status: ready              -> layout probed, descriptor fields verified
#         needs-investigation -> registered as a candidate; layout not yet pinned
#
# Enumerated 2026-06 from github.com/awslabs/open-data-registry (grep COG + aerial).

collections:

  # ---------------------------------------------------------------------------
  # ACTIVE  (bucket in us-west-2)
  # ---------------------------------------------------------------------------

  - id: naip
    title: NAIP (USDA National Agriculture Imagery Program)
    active: true
    status: ready
    extent:
      region_kind: us-conus        # covers all CONUS states; region is key-parsed
      bbox: [-125.0, 24.0, -66.5, 49.5]
      years: [2010, 2023]          # varies by state; refine from footprint lake
    source:
      bucket: naip-analytic        # 4-band RGBIR COG
      bucket_region: us-west-2
      access: requester-pays
      root_prefix: ""              # <state>/<year>/... is the top level
      region: key-parsed           # state from key path
      discovery: manifest-index    # pre-published manifest; s3-prefix also works
      cog_filter: "key.endswith('.tif') and '/rgbir_cog/' in key"
    cog_verified: "canonical RGBIR COG; in production ingest since project start"

  # naip-visualization (3-band RGB) intentionally NOT registered: the bucket has
  # no S3 CORS config, so its COGs can't be range-read from the browser (a
  # cross-origin GET returns no Access-Control-Allow-Origin). Re-add only if the
  # bucket owner adds CORS (GET/HEAD + ExposeHeaders Content-Range).

  - id: kyfromabove
    title: KyFromAbove (Kentucky)
    active: true
    status: ready
    extent:
      region_kind: us-state
      region_code: KY
      bbox: [-89.6, 36.5, -81.9, 39.15]
      years: [2012, 2024]
    source:
      bucket: kyfromabove
      bucket_region: us-west-2
      access: public               # --no-sign-request; no RequestPayer
      root_prefix: imagery/orthos/
      region: const:ky
      discovery: s3-prefix         # 2-level: list product folders, match KY_KYAPED_<year>_*
      cog_filter: "key.endswith('_cog.tif') and no {Overviews,Metadata,TileGrid,County-Mosaics,FlightInformationData}"
    cog_verified: "2026-06: real COG (tiled, IFD@front byte192, internal overviews, JPEG)"
    notes: GSD to 3in; LeafOFF/ON; also has a STAC API (fallback adapter).

  - id: nj-imagery
    title: New Jersey Statewide Digital Aerial Imagery
    active: true
    status: ready
    extent:
      region_kind: us-state
      region_code: NJ
      bbox: [-75.6, 38.9, -73.9, 41.36]
      years: [2015, 2020]          # COG (`cog/`) years; full archive 1930+ is SID/JP2
    source:
      bucket: njogis-imagery
      bucket_region: us-west-2
      access: public
      root_prefix: ""              # <year>/cog/<tile>.tif
      region: const:nj
      discovery: s3-prefix         # enumerate_prefixes -> ["<year>/cog/"]
      cog_filter: "key.endswith('.tif') and '/cog/' in key"
    cog_verified: "2026-06: real COG (tiled, IFD@front byte192, internal overviews, Deflate)"
    display:
      sample_bits: 16
      domain: [0, 65535]
    notes: Mixed formats per year (cog/ vs MG3/MG4/sid zips); COG only in recent years.

  - id: in-imagery
    title: Indiana Statewide Digital Aerial Imagery
    active: true                   # us-east-2 bucket, read cross-region (public, anonymous)
    status: ready
    extent:
      region_kind: us-state
      region_code: IN
      bbox: [-88.1, 37.77, -84.78, 41.76]
      years: [2011, 2025]          # modern statewide annual; also 1970/1998/2005 archives
    source:
      bucket: gisimageryingov
      bucket_region: us-east-2
      access: public
      root_prefix: imageryoptimized/statewide/   # the distributable COGs, NOT the ArcGIS cache/raw
      region: const:in
      discovery: s3-prefix         # statewide/<year>/<SPE|SPW>/<res>in/in<year>_<tile>_<res>.tif
      cog_filter: "key.endswith('.tif') and '/imageryoptimized/statewide/' in key"
    cog_verified: "2026-06: real COG (tiled 512, 5000x5000, 4-band RGBIR uint8, Deflate, internal overviews)"
    display:
      sample_bits: 8
      domain: [0, 255]
    notes: >
      COGs at imageryoptimized/statewide/<year>/<SPE|SPW>/<res>in/ (e.g.
      .../2024/SPW/03in/in2024_28222356_03.tif); NAD83(HARN) Indiana State Plane
      East/West, US survey feet. Tile-index shapefiles under
      imageryindex/statewide/<year>/<zone>/<res>/ give ready footprints. Older
      years differ (1970 per-county *cog.tif; 2005 CIR/RGB). Skip imagerycache/,
      archive/, dem* (ArcGIS-server artifacts).

  # ---------------------------------------------------------------------------
  # PARKED  (bucket not in us-west-2 — out of current scope, layout preserved)
  # ---------------------------------------------------------------------------

  - id: vt-opendata
    title: Vermont Open Geospatial (VTORTHO)
    active: true                  # active
    status: ready
    extent:
      region_kind: us-state
      region_code: VT
      bbox: [-73.44, 42.73, -71.46, 45.02]
      years: [1994, 2021]
    source:
      bucket: vtopendata-prd
      bucket_region: us-east-2
      access: public
      root_prefix: Imagery/_Tiles/VTORTHO/   # the tiled product (clean single years)
      region: const:vt
      discovery: s3-prefix         # .../<res>/<profile>/<year>/COGS/VT_<tile>_<yyyymmdd>.tif
      cog_filter: "key.endswith('.tif') and '/COGS/' in key"
    notes: >
      One bucket, several products. Tiled VTORTHO chosen over the flat statewide
      mosaics (which include year-range vintages like 2016-2019). LeafOFF/ON;
      PAN(1-band)/CLRIR(4-band); GSD to 13cm.


  # -----------------------------------------------------------------------------------------------------------
  # EXCLUDED  (in us-west-2, but no COG-conforming product — fails the scope rule)
  # ---------------------------------------------------------------------------

  - id: colorado-imagery
    title: State of Colorado Imagery (DRAPP)
    active: false
    status: excluded-not-cog
    extent:
      region_kind: us-metro          # DRAPP = Denver Regional, NOT statewide CO
      region_code: CO
      bbox: [-105.6, 39.0, -104.2, 40.3]   # approx Denver metro; refine if ever converted
    source:
      bucket: colorado-public-imagery
      bucket_region: us-west-2
      access: public
    notes: >
      VERIFIED 2026-06 NOT a COG. DRAPP/.../GeoTIFF/<tile>.tif are classic
      GDAL tiled GeoTIFFs: first IFD at EOF (byte ~451,589,260 of 452MB), NO
      internal overviews (external .tif.ovr sidecars), uncompressed. Internally
      tiled (256px) so rasterio CAN window them, but they fail the COG-only scope
      rule (front IFD + internal overviews) and won't serve the client COG viewer.
      OpenData/ is empty; NAIP/ is redundant with canonical naip-analytic.
      To use later: convert to COG on ingest (rio cogeo / gdal_translate -of COG)
      -> makes us a COG *producer*, out of scope now. Publishes an SNS
      object_created topic if a conversion pipeline is ever built.
