## Draft Registry of Open Data on AWS record for the NAIP GeoParquet coverage index.
## Submit as a PR to https://github.com/awslabs/open-data-registry
## (datasets/naip-geoparquet-coverage-index.yaml).
##
## Naming note: this index is NOT a STAC catalog, and this record deliberately
## no longer claims to be one. It is a purpose-built Hive-partitioned GeoParquet
## dataset with its own column set (see Description). The bucket was originally
## `naip-stac-catalog`; since S3 has no rename, the data was copied to
## `naip-geoparquet-index` so the name matches the contents. Done before this
## record was ever submitted, so no published reference to the old name exists.
##
## If STAC interoperability is wanted later, the thing to adopt is
## stac-geoparquet (https://github.com/stac-utils/stac-geoparquet), which
## specifies how STAC Items are stored in GeoParquet. That is a schema change,
## not a rename. Separately, the read API in this repo does serve valid STAC
## Items built from this index (STAC 1.1.0, projection v2.0.0, grid v1.1.0) --
## but the Parquet files themselves are not STAC.
Name: NAIP GeoParquet Coverage Index
Description: >-
  A cloud-native, queryable coverage index over the USDA National Agriculture
  Imagery Program (NAIP) 4-band COG tiles published in the public
  `naip-analytic` bucket. It is a Hive-partitioned GeoParquet dataset
  (partitioned by `state` and `naip_year`) with one row per quarter-quad COG,
  carrying the S3 source key, footprint geometry and bbox, resolution,
  acquisition date, USGS quad, product, and projection metadata (EPSG code,
  raster shape, affine transform). It lets you discover and filter NAIP coverage
  (which tiles exist for a state/year/area) with a single DuckDB / Athena /
  Spark query — no 400 MB manifest scan, no per-object listing. It is kept
  current against the live bucket (NAIP's published manifest.txt is frozen at
  2023-03-09; this index includes post-2023 acquisitions). Note that this is a
  purpose-built index schema — not STAC, and not stac-geoparquet.
Documentation: https://github.com/mwkorver/deckgl-s3-cog-s1m#readme
Contact: https://github.com/mwkorver/deckgl-s3-cog-s1m/issues
ManagedBy: "[Mark Korver](https://github.com/mwkorver)"
UpdateFrequency: >-
  Refreshed as USDA publishes new NAIP to naip-analytic (a few states per year);
  historical partitions are immutable.
Collabs: {}
Tags:
