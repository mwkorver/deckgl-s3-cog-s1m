License: >-
  The index (this GeoParquet dataset) is released into the public domain under
  Creative Commons CC0 1.0. The underlying NAIP imagery it indexes is a work of
  the U.S. Government (USDA-FPAC-BC-APFO) and is in the U.S. public domain.
Resources:
  - Description: >-
      NAIP GeoParquet coverage index (Hive-partitioned by state, naip_year).
      Requester-pays: callers must authenticate and send the request-payer
      header, and are billed for requests and egress.
    ARN: arn:aws:s3:::naip-geoparquet-index/manifest-index
    Region: us-west-2
    Type: S3 Bucket
    RequesterPays: True
  - Description: Source NAIP 4-band COG imagery this index points at (requester-pays)
    ARN: arn:aws:s3:::naip-analytic
    Region: us-west-2
    Type: S3 Bucket
    RequesterPays: True
