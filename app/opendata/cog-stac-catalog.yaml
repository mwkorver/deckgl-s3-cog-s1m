## Registry of Open Data on AWS record for the NAIP STAC catalog.
## Submit as a PR to https://github.com/awslabs/open-data-registry
## (datasets/naip-stac-catalog.yaml). Fill in the TODO contact/URL fields first.
Name: NAIP STAC Catalog
Description: >-
  A cloud-native, queryable catalog of the USDA National Agriculture Imagery
  Program (NAIP) 4-band COG tiles published in the public `naip-analytic` bucket.
  The catalog is a Hive-partitioned GeoParquet index (partitioned by `state` and
  `naip_year`) with one row per quarter-quad COG, carrying the S3 source key,
  resolution, acquisition date, USGS quad, and product. It lets you discover and
  filter NAIP coverage (which tiles exist for a state/year/area) with a single
  DuckDB / Athena / Spark query — no 400 MB manifest scan, no per-object listing.
  It is kept current against the live bucket (NAIP's published manifest.txt is
  frozen at 2023-03-09; this catalog includes post-2023 acquisitions).
Documentation: https://github.com/mwkorver/deck.gl-naip-conus  # TODO: docs page
Contact: https://github.com/mwkorver/deck.gl-naip-conus/issues
ManagedBy: "[Mike Korver](https://github.com/mwkorver)"
UpdateFrequency: >-
  Refreshed as USDA publishes new NAIP to naip-analytic (a few states per year);
  historical partitions are immutable.
Collabs: {}
Tags:
  - aws-pds
  - agriculture
  - geospatial
  - imagery
  - aerial imagery
  - stac
  - parquet
  - earth observation
  - united states
License: >-
  The catalog (this GeoParquet index) is released into the public domain under
  Creative Commons CC0 1.0. The underlying NAIP imagery it indexes is a work of
  the U.S. Government (USDA-FPAC-BC-APFO) and is in the U.S. public domain.
Resources:
  - Description: NAIP STAC catalog — GeoParquet manifest index (Hive-partitioned by state, naip_year)
    ARN: arn:aws:s3:::naip-stac-catalog/manifest-index
    Region: us-west-2
    Type: S3 Bucket
    Explore:
      - '[Browse the catalog prefixes](https://naip-stac-catalog.s3.us-west-2.amazonaws.com/?prefix=manifest-index/)'
  - Description: Source NAIP 4-band COG imagery this catalog indexes (requester-pays)
    ARN: arn:aws:s3:::naip-analytic
    Region: us-west-2
    Type: S3 Bucket
    RequesterPays: True
