# Foundation stack -- the STATEFUL, privileged prerequisites that must exist
# BEFORE the per-account SAM app stack (cog-stac-read) is ever deployed:
#
#   1. the viewer S3 bucket  (cog-stac-viewer-<acct>-<region>)  -- public static
#      viewer + the app's PRIVATE output (lake/ footprints).
#   2. the CloudFront CORS + cache proxy in front of the PUBLIC source COG buckets
#      (KyFromAbove, New Jersey) -- adds CORS for browser range-reads and edge-
#      caches tiles. (NAIP is requester-pays and stays on the presigned path.)
#
# WHY a separate stack (admin, one-time):
#   * Blast radius. Creating a bucket and a CloudFront distribution are rare,
#     privileged, stateful operations. Keeping them OUT of the frequently-run
#     `sam deploy` lets the day-to-day deploy role stay narrowly scoped (no
#     s3:CreateBucket / cloudfront:CreateDistribution) -- it only deploys app
#     CODE and invalidates the tile cache.
#   * Data safety. `sam delete` (pause/teardown) removes the Lambdas but NEVER
#     this bucket or the data in it; the bucket is Retain'd here, and the app
#     stack only REFERENCES it by (deterministic) name.
#
# DEPLOY (admin, once):
#   ./deploy-foundation.sh        # wraps the cloudformation deploy below
#   # or directly:
#   aws cloudformation deploy --stack-name cog-stac-foundation \
#     --template-file app/lambda/foundation.yaml --region us-west-2
#
#   # read the outputs the viewer publish + invalidation need:
#   aws cloudformation describe-stacks --stack-name cog-stac-foundation \
#     --region us-west-2 --query "Stacks[0].Outputs"
#
#   # NOTE: this stack CREATES the bucket and distribution. If either already
#   # exists out of band, deploy-foundation.sh refuses to create duplicates.
#   # Import or migrate those resources deliberately; do not delete them as a
#   # routine deployment step.
#
# ADD A PUBLIC BUCKET to the proxy: copy one Origin + one CacheBehavior below,
# changing the bucket name -- that's the only change (the strip function is
# generic).
AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  cog-stac foundation: the Retain'd viewer / app-output S3 bucket.
  Admin-owned, deployed once before the SAM app stack. (The former CloudFront
  CORS/cache proxy for public source COGs was removed -- the viewer now reads
  public buckets directly via their own CORS.)

Rules:
  RegionLock:
    Assertions:
      - Assert: !Equals [!Ref "AWS::Region", "us-west-2"]
        AssertDescription: "cog-stac-foundation must be deployed in us-west-2."

Resources:

  # ----- 1. Viewer / app-output bucket -------------------------------------
  # Retain on stack delete: this holds the lake the app wrote, so a
  # `cloudformation delete-stack` (or `sam delete` of the app stack) must never
  # take the data with it.
  ViewerBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "cog-stac-viewer-${AWS::AccountId}-${AWS::Region}"
      # Static-website hosting; SPA fallback to index.html.
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      # ACLs disabled (BucketOwnerEnforced); the public read is granted by the
      # bucket POLICY below, not by object ACLs.
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      # Allow a public bucket policy (the policy scopes exactly what is public);
      # keep ACL-based public access blocked.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Application
          Value: deck.gl-s3-cog

  # Public-read the viewer files, but DENY public reads of the app's PRIVATE
  # output (lake/). Anonymous requests carry no aws:PrincipalAccount,
  # so StringNotEquals matches and denies them; in-account principals (the Lambda
  # exec roles, the deployer) are unaffected and read via their own IAM.
  ViewerBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ViewerBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadViewer
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${ViewerBucket}/*"
          - Sid: DenyPublicAppOutput
            Effect: Deny
            Principal: "*"
            Action: s3:GetObject
            Resource:
              - !Sub "arn:aws:s3:::${ViewerBucket}/lake/*"
            Condition:
              StringNotEquals:
                aws:PrincipalAccount: !Ref "AWS::AccountId"

Outputs:
  ViewerBucketName:
    Description: The viewer / app-output S3 bucket (deploy-viewer.sh target).
    Value: !Ref ViewerBucket
    Export:
      Name: cog-stac-foundation-ViewerBucketName
  ViewerUrl:
    Description: Static viewer website endpoint (HTTP). Run deploy-viewer.sh to publish.
    Value: !Sub "http://${ViewerBucket}.s3-website-${AWS::Region}.amazonaws.com"
    Export:
      Name: cog-stac-foundation-ViewerUrl
