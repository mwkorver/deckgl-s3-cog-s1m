AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  DeckGL S3 COG S1M ingest API on Lambda. Runs the full ingest dependency set as an
  arm64 container image with a 15-minute timeout. Deployed independently from
  the zip-based read API so routine read changes do not rebuild this image.

Rules:
  RegionLock:
    Assertions:
      - Assert: !Equals [!Ref "AWS::Region", "us-west-2"]
        AssertDescription: "deckgl-s3-cog-s1m-ingest must be deployed in us-west-2 (data residency)."

Parameters:
  IngestToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Shared token required by POST /ingest/run-sync. Set from
      S3_COG_INGEST_TOKEN during deploy. Empty leaves the Lambda endpoint
      fail-closed with 503.

Resources:
  # The legacy combined stack used the physical name deckgl-s3-cog-s1m-ingest. Use a new
  # physical name so this stack can be deployed before the read stack removes
  # the legacy resource. This avoids a name collision and minimizes migration
  # disruption.
  DeckglS3CogS1mIngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: deckgl-s3-cog-s1m-ingest-worker
      PackageType: Image
      Architectures:
        - arm64
      Timeout: 900
      MemorySize: 1769
      Environment:
        Variables:
          S3_COG_LAKE_ROOT: !Sub "s3://deckgl-s3-cog-s1m-${AWS::AccountId}-us-west2/lake"
          S3_COG_MANIFEST_INDEX: s3://naip-geoparquet-index/manifest-index
          S3_COG_MANIFEST_SOURCE: s3://naip-analytic/manifest.txt
          S3_COG_REQUEST_PAYER: requester
          S3_COG_SIGN_ASSET_URLS: "1"
          S3_COG_INGEST_TOKEN: !Ref IngestToken
          # Extensions are baked into the image by Dockerfile.ingest.
          DUCKDB_EXT_DIR: /opt/duckdb_extensions
      Policies:
        - Statement:
            - Effect: Allow
              Action: s3:ListBucket
              Resource: !Sub "arn:aws:s3:::deckgl-s3-cog-s1m-${AWS::AccountId}-us-west2"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource:
                - !Sub "arn:aws:s3:::deckgl-s3-cog-s1m-${AWS::AccountId}-us-west2/lake/*"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - arn:aws:s3:::naip-geoparquet-index
                - arn:aws:s3:::naip-geoparquet-index/*
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - arn:aws:s3:::naip-analytic
                - arn:aws:s3:::naip-analytic/*
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
          AllowHeaders:
            - "*"
    Metadata:
      Dockerfile: Dockerfile.ingest
      DockerContext: ../api
      DockerTag: ingest-arm64

Outputs:
  IngestUrl:
    Description: Base invoke URL for the DeckGL S3 COG S1M ingest function.
    Value: !GetAtt DeckglS3CogS1mIngestFunctionUrl.FunctionUrl
  LakeRoot:
    Description: Private GeoParquet output prefix shared with the read stack.
    Value: !Sub "s3://deckgl-s3-cog-s1m-${AWS::AccountId}-us-west2/lake"
