name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: build · typecheck · test (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # packages/morecantile/spec and fixtures/geotiff-test-data are git
          # submodules that typecheck + some tests read from.
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r typecheck
      # geotiff's integration-rasterio suite compares against .npy arrays that
      # geotiff-test-data generates rather than commits (`pixi run generate-npy`).
      # That suite self-skips when they're absent, so it reports as skipped here
      # instead of being excluded by a --filter.
      - run: pnpm -r test

  python:
    name: ruff · pytest (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt -r app/api/requirements.txt
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: pytest
        run: python -m pytest
        working-directory: app/api
        # No AWS credentials needed: the tests set S3_COG_LAKE_ROOT="", so the
        # DuckDB S3 secret (created only for s3:// lake roots) is never reached,
        # and network-dependent tests are deselected by the `network` marker.

  lint-js:
    name: biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # biome is scoped to the packages/* libraries (see biome.json);
      # the app/ viewer HTML + JSON data are intentionally excluded.
      - run: pnpm exec biome ci .
